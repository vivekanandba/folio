<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Folio — revise what you've learned through interactive sessions" />
    <title>Folio</title>
    <script>
      // Apply stored theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('folio-theme')
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
